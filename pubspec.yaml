name: posturely
description: AI-Powered Posture Care - A medical-grade posture coaching application
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_commons: ^0.8.0
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # To add custom fonts to your application, add a fonts section here.
